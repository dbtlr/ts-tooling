name: Release

on:
  push:
    branches: [main]

# Per-job least privilege; nothing at top level.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        # Default filenames release-please-config.json + .release-please-manifest.json
        # are auto-detected (manifest mode). Uses the built-in GITHUB_TOKEN.

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: required for npm trusted publishing.
    env:
      # `prepare` runs `vp config`; skip git-hook installation in CI.
      VITE_GIT_HOOKS: 0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0 — reads packageManager (pnpm@11.9.0) from package.json

      # Auth is via OIDC trusted publishing — no static credentials by design.
      # Do NOT add a setup-node auth block or any npm credential here.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, format & type-check
        run: pnpm exec vp check

      - name: Test
        run: pnpm exec vp test

      - name: Build
        run: pnpm exec vp pack

      - name: Examples (dogfood gate)
        run: pnpm run check:examples

      - name: Publish to npm (OIDC, provenance automatic)
        run: pnpm publish --no-git-checks
