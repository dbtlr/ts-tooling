name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: vp check + tests
    runs-on: ubuntu-latest
    env:
      # `prepare` runs `vp config`; skip git-hook installation in CI.
      VITE_GIT_HOOKS: 0
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, format & type-check
        run: pnpm exec vp check

      - name: Test
        run: pnpm exec vp test

      - name: Build
        run: pnpm exec vp pack

      - name: Examples
        run: pnpm run check:examples

      - name: Pack (dry-run)
        run: pnpm run pack:dry
