name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: vp check + tests
    runs-on: ubuntu-latest
    env:
      # `prepare` runs `vp config`; skip git-hook installation in CI.
      VITE_GIT_HOOKS: 0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, format & type-check
        run: pnpm exec vp check

      - name: Test
        run: pnpm exec vp test

      - name: Build
        run: pnpm exec vp pack

      - name: Examples
        run: pnpm run check:examples

      - name: Pack (dry-run)
        run: pnpm run pack:dry
